name: Docs

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - 'website/**'
      - 'core/src/main/**'
      - 'sql/src/main/**'
      - 'mongodb/src/main/**'
      - 'postgresql/src/main/**'
      - 'mysql/src/main/**'
      - 'sparksql/src/main/**'
      - 'elasticsearch/src/main/**'
      - 'sql-jdbc/src/main/**'
      - 'mongodb-driver/src/main/**'
      - 'elasticsearch-client/src/main/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Compile mdoc
        run: sbt docs/mdoc

      - name: Install website dependencies
        working-directory: website
        run: npm ci

      - name: Build website
        working-directory: website
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
