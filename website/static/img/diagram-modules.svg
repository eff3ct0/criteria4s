<svg width="720" height="248" viewBox="0 0 720 248" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .mono  { font-family: ui-monospace, 'Cascadia Code', monospace; }
    .title { font-size: 13px; fill: #171717; font-weight: 600; }
    .sub   { font-size: 10px; fill: #737373; }
    .badge { font-size: 10px; fill: #737373; font-weight: 600; letter-spacing: 0.06em; }
  </style>
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5.5" refY="3.5" orient="auto">
      <polygon points="0 0, 7 3.5, 0 7" fill="#d4d4d4"/>
    </marker>
  </defs>

  <!-- ── Level 0: core ─────────────────────────────────────── -->
  <rect x="260" y="20" width="200" height="48" rx="6"
        fill="#171717" stroke="#171717" stroke-width="1"/>
  <text x="360" y="41" text-anchor="middle" font-size="13" fill="#ffffff" font-weight="600" class="mono">criteria4s-core</text>
  <text x="360" y="58" text-anchor="middle" font-size="10" fill="#a3a3a3">no external dependencies</text>

  <!-- ── Level 0 → 1 connectors ────────────────────────────── -->
  <line x1="360" y1="68"  x2="360" y2="88"  stroke="#d4d4d4" stroke-width="1.5"/>
  <line x1="130" y1="88"  x2="590" y2="88"  stroke="#d4d4d4" stroke-width="1.5"/>
  <line x1="130" y1="88"  x2="130" y2="100" stroke="#d4d4d4" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="360" y1="88"  x2="360" y2="100" stroke="#d4d4d4" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="575" y1="88"  x2="575" y2="100" stroke="#d4d4d4" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Level 1: sql ───────────────────────────────────────── -->
  <rect x="50" y="100" width="160" height="48" rx="6"
        fill="#f4f4f5" stroke="#e5e5e5" stroke-width="1"/>
  <text x="130" y="121" text-anchor="middle" font-size="13" fill="#171717" font-weight="600" class="mono">criteria4s-sql</text>
  <text x="130" y="138" text-anchor="middle" font-size="10" fill="#737373">SQL base dialect</text>

  <!-- ── Level 1: mongodb ───────────────────────────────────── -->
  <rect x="275" y="100" width="170" height="48" rx="6"
        fill="#f4f4f5" stroke="#e5e5e5" stroke-width="1"/>
  <text x="360" y="121" text-anchor="middle" font-size="13" fill="#171717" font-weight="600" class="mono">criteria4s-mongodb</text>
  <text x="360" y="138" text-anchor="middle" font-size="10" fill="#737373">MongoDB dialect</text>

  <!-- ── Level 1: elasticsearch ─────────────────────────────── -->
  <rect x="460" y="100" width="230" height="48" rx="6"
        fill="#f4f4f5" stroke="#e5e5e5" stroke-width="1"/>
  <text x="575" y="121" text-anchor="middle" font-size="13" fill="#171717" font-weight="600" class="mono">criteria4s-elasticsearch</text>
  <text x="575" y="138" text-anchor="middle" font-size="10" fill="#737373">Elasticsearch dialect</text>

  <!-- ── Level 1 → 2 connectors (sql children) ─────────────── -->
  <line x1="130" y1="148" x2="130" y2="168" stroke="#d4d4d4" stroke-width="1.5"/>
  <line x1="75"  y1="168" x2="345" y2="168" stroke="#d4d4d4" stroke-width="1.5"/>
  <line x1="75"  y1="168" x2="75"  y2="180" stroke="#d4d4d4" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="210" y1="168" x2="210" y2="180" stroke="#d4d4d4" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="345" y1="168" x2="345" y2="180" stroke="#d4d4d4" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Level 2: postgresql ───────────────────────────────── -->
  <rect x="14" y="180" width="122" height="40" rx="6"
        fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
  <text x="75" y="197" text-anchor="middle" font-size="11" fill="#171717" font-weight="500" class="mono">postgresql</text>
  <text x="75" y="212" text-anchor="middle" font-size="10" fill="#737373">PostgreSQL</text>

  <!-- ── Level 2: mysql ────────────────────────────────────── -->
  <rect x="154" y="180" width="112" height="40" rx="6"
        fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
  <text x="210" y="197" text-anchor="middle" font-size="11" fill="#171717" font-weight="500" class="mono">mysql</text>
  <text x="210" y="212" text-anchor="middle" font-size="10" fill="#737373">MySQL</text>

  <!-- ── Level 2: sparksql ─────────────────────────────────── -->
  <rect x="282" y="180" width="126" height="40" rx="6"
        fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
  <text x="345" y="197" text-anchor="middle" font-size="11" fill="#171717" font-weight="500" class="mono">sparksql</text>
  <text x="345" y="212" text-anchor="middle" font-size="10" fill="#737373">Spark SQL</text>
</svg>
